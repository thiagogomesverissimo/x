<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sobre Mim</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      max-width: 500px;
      text-align: center;
    }

    .card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #fff;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      opacity: 0.9;
    }

    .tags {
      margin-top: 15px;
    }

    .tag {
      display: inline-block;
      background: #ffffff22;
      padding: 5px 10px;
      border-radius: 15px;
      margin: 5px;
      font-size: 12px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #00c6ff;
      color: #000;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ffcc;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="https://via.placeholder.com/120" alt="Minha foto">

    <h1>João Victor</h1>

    <p>
      Olá! Eu sou um desenvolvedor em aprendizado, apaixonado por tecnologia,
      Linux, Docker e desenvolvimento web. Estou sempre buscando evoluir
      minhas habilidades e criar projetos interessantes.
    </p>

    <div class="tags">
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">PHP</span>
      <span class="tag">Drupal</span>
      <span class="tag">Docker</span>
    </div>

    <a class="btn" href="#">Me contate</a>
  </div>

</body>
</html>
